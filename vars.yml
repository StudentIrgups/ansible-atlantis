---
ip_bastion: ""
# Kubernetes
k8s_namespace: "atlantis"

# Atlantis
atlantis_image: "ghcr.io/runatlantis/atlantis:latest"
atlantis_replicas: 1
atlantis_port: 4141
atlantis_nodeport: 32000

# Ресурсы
atlantis_resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "2Gi"
    cpu: "1000m"

# GitHub
atlantis_github_user: "username"
atlantis_repo_allowlist: "github.com/username/repo"
github_repo: "diplom"  
atlantis_webhook_url: "http://externalIp:AtlantisPort/events"
atlantis_yaml_content: |
  version: 3
  projects:
  - name: default
    dir: .
    workflow: default
    autoplan:
      enabled: true
      when_modified: ["*.tf", "*.tfvars", "*.hcl"]

# MySQL
mysql_database: "atlantis"
mysql_user: "atlantis"

# S3 (публичные)
s3_bucket_name: "bucket"
s3_endpoint: "https://storage.yandexcloud.net"

# Пути к файлам кредов на бастионе
yc_key_file_path: "/home/localuser/authorized-key.json"
s3_credentials_file_path: "/home/localuser/credentials"
ssh_public_key_path: "/home/localuser/id_rsa.pub"

terraformrc_file_path: "/home/localuser/.terraformrc"

# Yandex Cloud (публичные ID)
cloud_id: "b1ggcxxxxxxxxxxxxx"
folder_id: "b1gxxxxxxxxxxxxxxxxx"