---
- name: Deploy Atlantis to Kubernetes (без Ingress, NodePort)
  hosts: localhost
  gather_facts: yes
  vars_files:
    - /opt/atlantis/vars.yml
    - /opt/atlantis/vault.yml
  
  tasks:
    - name: Создать директорию для манифестов
      file:
        path: /tmp/atlantis-manifests
        state: directory
    
    - name: Создать namespace манифест
      copy:
        dest: /tmp/atlantis-manifests/namespace.yaml
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ k8s_namespace }}
    
    - name: Применить namespace
      command: kubectl apply -f /tmp/atlantis-manifests/namespace.yaml
    
    - name: Создать secrets манифест
      copy:
        dest: /tmp/atlantis-manifests/secrets.yaml
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: atlantis-secrets
            namespace: {{ k8s_namespace }}
          type: Opaque
          stringData:
            ATLANTIS_GH_TOKEN: "{{ atlantis_github_token }}"
            ATLANTIS_GH_WEBHOOK_SECRET: "{{ atlantis_webhook_secret }}"
    
    - name: Применить secrets
      command: kubectl apply -f /tmp/atlantis-manifests/secrets.yaml
      no_log: true
    
    - name: Создать ConfigMap манифест
      copy:
        dest: /tmp/atlantis-manifests/configmap.yaml
        content: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: atlantis-repo-config
            namespace: {{ k8s_namespace }}
          data:
            repos.yaml: |
              repos:
              - id: /.*/
                apply_requirements: [mergeable, approved]
                workflow: default
    
    - name: Применить ConfigMap
      command: kubectl apply -f /tmp/atlantis-manifests/configmap.yaml
    
    - name: Создать ServiceAccount и Deployment манифест
      copy:
        dest: /tmp/atlantis-manifests/deployment.yaml
        content: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: atlantis
            namespace: {{ k8s_namespace }}
          
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: atlantis
            namespace: {{ k8s_namespace }}
            labels:
              app: atlantis
          spec:
            replicas: {{ atlantis_replicas }}
            selector:
              matchLabels:
                app: atlantis
            template:
              metadata:
                labels:
                  app: atlantis
              spec:
                serviceAccountName: atlantis
                containers:
                - name: atlantis
                  image: {{ atlantis_image }}
                  imagePullPolicy: IfNotPresent
                  ports:
                  - name: web
                    containerPort: {{ atlantis_port }}
                    protocol: TCP
                  env:
                  - name: ATLANTIS_GH_USER
                    value: "{{ atlantis_github_user }}"
                  - name: ATLANTIS_GH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: atlantis-secrets
                        key: ATLANTIS_GH_TOKEN
                  - name: ATLANTIS_GH_WEBHOOK_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: atlantis-secrets
                        key: ATLANTIS_GH_WEBHOOK_SECRET
                  - name: ATLANTIS_REPO_ALLOWLIST
                    value: |
                      {{ atlantis_repo_allowlist | indent(22) }}
                  - name: ATLANTIS_PORT
                    value: "{{ atlantis_port }}"
                  - name: ATLANTIS_DATA_DIR
                    value: /atlantis-data
                  - name: ATLANTIS_ATLANTIS_URL
                    value: "http://{{ atlantis_external_ip | default('localhost') }}:{{ atlantis_nodeport | default('31414') }}"
                  volumeMounts:
                  - name: data
                    mountPath: /atlantis-data
                  - name: config
                    mountPath: /etc/atlantis
                  resources:
                    requests:
                      memory: {{ atlantis_resources.requests.memory }}
                      cpu: {{ atlantis_resources.requests.cpu }}
                    limits:
                      memory: {{ atlantis_resources.limits.memory }}
                      cpu: {{ atlantis_resources.limits.cpu }}
                  livenessProbe:
                    httpGet:
                      path: /healthz
                      port: {{ atlantis_port }}
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /healthz
                      port: {{ atlantis_port }}
                    initialDelaySeconds: 10
                    periodSeconds: 5
                volumes:
                - name: data
                  emptyDir: {}
                - name: config
                  configMap:
                    name: atlantis-repo-config
    
    - name: Применить deployment
      command: kubectl apply -f /tmp/atlantis-manifests/deployment.yaml
    
    - name: Создать Service с NodePort
      copy:
        dest: /tmp/atlantis-manifests/service.yaml
        content: |
          apiVersion: v1
          kind: Service
          metadata:
            name: atlantis
            namespace: {{ k8s_namespace }}
            labels:
              app: atlantis
          spec:
            type: NodePort
            ports:
            - name: web
              port: 80
              targetPort: {{ atlantis_port }}
              nodePort: {{ atlantis_nodeport | default(31414) }}
              protocol: TCP
            selector:
              app: atlantis
    
    - name: Применить service
      command: kubectl apply -f /tmp/atlantis-manifests/service.yaml
    
    - name: Ожидание готовности подов
      command: kubectl wait --for=condition=ready pod -l app=atlantis -n {{ k8s_namespace }} --timeout=300s
      register: wait_result
      failed_when: wait_result.rc != 0
    
    - name: Получить статус подов
      command: kubectl get pods -n {{ k8s_namespace }}
      register: pods_status
    
    - name: Получить IP воркер ноды
      command: kubectl get nodes -o wide --selector='!node-role.kubernetes.io/master' -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
      register: worker_ip
    
    - name: Получить NodePort
      command: kubectl get svc atlantis -n {{ k8s_namespace }} -o jsonpath='{.spec.ports[0].nodePort}'
      register: nodeport
    
    - name: Показать статус
      debug:
        var: pods_status.stdout_lines
    
    - name: Вывести информацию о доступе
      debug:
        msg: |
          ==================================================
          ✅ Atlantis успешно установлен!
          
          Namespace: {{ k8s_namespace }}
          
          ДОСТУП К ATLANTIS:
          URL: http://{{ worker_ip.stdout }}:{{ nodeport.stdout }}
          Webhook URL: http://{{ worker_ip.stdout }}:{{ nodeport.stdout }}/events
          
          Проверка здоровья:
          curl http://{{ worker_ip.stdout }}:{{ nodeport.stdout }}/healthz
          
          Просмотр логов:
          kubectl logs -f deployment/atlantis -n {{ k8s_namespace }}
          
          Проброс порта (альтернативный доступ):
          kubectl port-forward -n {{ k8s_namespace }} svc/atlantis 8080:80
          Затем: http://localhost:8080
          ==================================================