---
- name: Deploy Atlantis to Kubernetes with MySQL and file-based credentials
  hosts: localhost
  gather_facts: yes
  vars_files:
    - ./vars.yml
    - ./vault.yml
  
  tasks:
    - name: Создать директорию для манифестов
      file:
        path: /tmp/atlantis-manifests
        state: directory
    
    # ============================================
    # Namespace
    # ============================================
    - name: Создать namespace
      copy:
        dest: /tmp/atlantis-manifests/namespace.yaml
        content: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: {{ k8s_namespace }}
    
    - name: Применить namespace
      command: kubectl apply -f /tmp/atlantis-manifests/namespace.yaml
    
    # ============================================
    # Секреты из файлов
    # ============================================
    - name: Создать секрет из файла Yandex Cloud credentials
      shell: |
        kubectl create secret generic yc-credentials \
          --namespace={{ k8s_namespace }} \
          --from-file=key.json={{ yc_key_file_path }} \
          --dry-run=client -o yaml | kubectl apply -f -
#      no_log: true
#      ignore_errors: yes
    
    - name: Создать секрет из файла S3 credentials
      shell: |
        kubectl create secret generic s3-credentials \
          --namespace={{ k8s_namespace }} \
          --from-file=credentials={{ s3_credentials_file_path }} \
          --dry-run=client -o yaml | kubectl apply -f -
#      no_log: true
#      ignore_errors: yes
    
    - name: Создать секрет из файла SSH public key
      shell: |
        kubectl create secret generic ssh-public-key \
          --namespace={{ k8s_namespace }} \
          --from-file=id_rsa.pub={{ ssh_public_key_path }} \
          --dry-run=client -o yaml | kubectl apply -f -
#      no_log: true
#      ignore_errors: yes
    
#    - name: Создать секрет из файла SSH private key
#      command: |
#        kubectl create secret generic ssh-private-key \
#          --namespace={{ k8s_namespace }} \
#          --from-file=id_rsa={{ ssh_private_key_path }} \
#          --dry-run=client -o yaml | kubectl apply -f -
#      no_log: true
#      ignore_errors: yes
    
    # ============================================
    # MySQL Secrets
    # ============================================
    - name: Создать MySQL secrets
      copy:
        dest: /tmp/atlantis-manifests/mysql-secrets.yaml
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: mysql-secrets
            namespace: {{ k8s_namespace }}
          type: Opaque
          stringData:
            MYSQL_ROOT_PASSWORD: "{{ mysql_root_password }}"
            MYSQL_PASSWORD: "{{ mysql_password }}"
            MYSQL_DATABASE: "{{ mysql_database }}"
            MYSQL_USER: "{{ mysql_user }}"
    
    - name: Применить MySQL secrets
      command: kubectl apply -f /tmp/atlantis-manifests/mysql-secrets.yaml
      no_log: true
    
    # ============================================
    # Atlantis Secrets (только GitHub)
    # ============================================
    - name: Создать Atlantis secrets
      copy:
        dest: /tmp/atlantis-manifests/atlantis-secrets.yaml
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: atlantis-secrets
            namespace: {{ k8s_namespace }}
          type: Opaque
          stringData:
            ATLANTIS_GH_TOKEN: "{{ atlantis_github_token }}"
            ATLANTIS_GH_WEBHOOK_SECRET: "{{ atlantis_webhook_secret }}"
            ATLANTIS_DB_TYPE: "mysql"
            ATLANTIS_DB_HOST: "mysql-service.{{ k8s_namespace }}.svc.cluster.local"
            ATLANTIS_DB_PORT: "3306"
            ATLANTIS_DB_NAME: "{{ mysql_database }}"
            ATLANTIS_DB_USER: "{{ mysql_user }}"
            ATLANTIS_DB_PASSWORD: "{{ mysql_password }}"
    
    - name: Применить Atlantis secrets
      command: kubectl apply -f /tmp/atlantis-manifests/atlantis-secrets.yaml
      no_log: true
    
    # ============================================
    # MySQL ConfigMap
    # ============================================
    - name: Создать MySQL ConfigMap
      copy:
        dest: /tmp/atlantis-manifests/mysql-configmap.yaml
        content: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: mysql-config
            namespace: {{ k8s_namespace }}
          data:
            my.cnf: |
              [mysqld]
              character-set-server=utf8mb4
              collation-server=utf8mb4_unicode_ci
              max_connections=200
              max_allowed_packet=256M
              innodb_buffer_pool_size=1G
              innodb_log_file_size=256M
              innodb_flush_log_at_trx_commit=2
              innodb_file_per_table=1
    
    - name: Применить MySQL ConfigMap
      command: kubectl apply -f /tmp/atlantis-manifests/mysql-configmap.yaml
    
    # ============================================
    # MySQL StatefulSet
    # ============================================
    - name: Создать MySQL StatefulSet (emptyDir)
      copy:
        dest: /tmp/atlantis-manifests/mysql-statefulset.yaml
        content: |
          apiVersion: v1
          kind: Service
          metadata:
            name: mysql
            namespace: {{ k8s_namespace }}
          spec:
            ports:
            - port: 3306
              name: mysql
            selector:
              app: mysql
          
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: mysql
            namespace: {{ k8s_namespace }}
            labels:
              app: mysql
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: mysql
            template:
              metadata:
                labels:
                  app: mysql
              spec:
                containers:
                - name: mysql
                  image: mysql:8.0
                  args:
                    - --default-authentication-plugin=mysql_native_password
                  env:
                  - name: MYSQL_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: mysql-secrets
                        key: MYSQL_ROOT_PASSWORD
                  - name: MYSQL_DATABASE
                    valueFrom:
                      secretKeyRef:
                        name: mysql-secrets
                        key: MYSQL_DATABASE
                  - name: MYSQL_USER
                    valueFrom:
                      secretKeyRef:
                        name: mysql-secrets
                        key: MYSQL_USER
                  - name: MYSQL_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: mysql-secrets
                        key: MYSQL_PASSWORD
                  ports:
                  - containerPort: 3306
                    name: mysql
                  volumeMounts:
                  - name: mysql-data
                    mountPath: /var/lib/mysql
                  - name: mysql-config
                    mountPath: /etc/mysql/conf.d
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                volumes:
                - name: mysql-data
                  emptyDir: {}
                - name: mysql-config
                  configMap:
                    name: mysql-config
    
    - name: Применить MySQL StatefulSet
      command: kubectl apply -f /tmp/atlantis-manifests/mysql-statefulset.yaml
    
    # ============================================
    # MySQL Service
    # ============================================
    - name: Создать MySQL Service
      copy:
        dest: /tmp/atlantis-manifests/mysql-service.yaml
        content: |
          apiVersion: v1
          kind: Service
          metadata:
            name: mysql-service
            namespace: {{ k8s_namespace }}
          spec:
            type: ClusterIP
            ports:
            - port: 3306
              targetPort: 3306
            selector:
              app: mysql
    
    - name: Применить MySQL Service
      command: kubectl apply -f /tmp/atlantis-manifests/mysql-service.yaml
    
    # ============================================
    # Ожидание MySQL
    # ============================================
    - name: Ожидание готовности MySQL
      command: kubectl wait --for=condition=ready pod -l app=mysql -n {{ k8s_namespace }} --timeout=300s
      register: mysql_wait
      failed_when: mysql_wait.rc != 0
    
    # ============================================
    # Atlantis ConfigMap
    # ============================================
    - name: Создать ConfigMap для Atlantis
      copy:
        dest: /tmp/atlantis-manifests/atlantis-configmap.yaml
        content: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: atlantis-repo-config
            namespace: {{ k8s_namespace }}
          data:
            repos.yaml: |
              repos:
              - id: /.*/
                apply_requirements: [mergeable, approved]
                workflow: default
                allowed_overrides: [workflow, apply_requirements]
                allow_custom_workflows: true
                autoplan:
                  enabled: true
                  when_modified: ["*.tf", "*.tfvars", "*.hcl", "**/*.tf", "**/*.tfvars"]
    
    - name: Применить ConfigMap для Atlantis
      command: kubectl apply -f /tmp/atlantis-manifests/atlantis-configmap.yaml

    - name: Создать ConfigMap для Terraform
      copy:
        dest: /tmp/atlantis-manifests/terraform-configmap.yaml
        content: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: atlantis-terraformrc
            namespace: {{ k8s_namespace }}
          data:
            terraformrc: |
              {{ lookup('file', terraformrc_file_path) | indent(10) }}

    - name: Применить ConfigMap
      command: kubectl apply -f /tmp/atlantis-manifests/terraform-configmap.yaml      
    
    # ============================================
    # Atlantis Deployment
    # ============================================
    - name: Создать Atlantis Deployment (emptyDir)
      copy:
        dest: /tmp/atlantis-manifests/atlantis-deployment.yaml
        content: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: atlantis
            namespace: {{ k8s_namespace }}
          
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: atlantis
            namespace: {{ k8s_namespace }}
            labels:
              app: atlantis
          spec:
            replicas: {{ atlantis_replicas }}
            selector:
              matchLabels:
                app: atlantis
            template:
              metadata:
                labels:
                  app: atlantis
              spec:
                serviceAccountName: atlantis
                initContainers:
                - name: wait-for-mysql
                  image: mysql:8.0
                  command:
                  - sh
                  - -c
                  - |
                    until mysql -h mysql-service -u root -p$MYSQL_ROOT_PASSWORD -e "SELECT 1"; do
                      echo "Waiting for MySQL...";
                      sleep 5;
                    done;
                  env:
                  - name: MYSQL_ROOT_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: mysql-secrets
                        key: MYSQL_ROOT_PASSWORD
                
                containers:
                - name: atlantis
                  image: {{ atlantis_image }}
                  imagePullPolicy: IfNotPresent
                  ports:
                  - containerPort: {{ atlantis_port }}
                  env:
                  - name: ATLANTIS_GH_USER
                    value: "{{ atlantis_github_user }}"
                  - name: ATLANTIS_GH_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: atlantis-secrets
                        key: ATLANTIS_GH_TOKEN
                  - name: ATLANTIS_GH_WEBHOOK_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: atlantis-secrets
                        key: ATLANTIS_GH_WEBHOOK_SECRET
                  - name: ATLANTIS_DB_TYPE
                    value: "mysql"
                  - name: ATLANTIS_DB_HOST
                    value: "mysql-service.{{ k8s_namespace }}.svc.cluster.local"
                  - name: ATLANTIS_DB_PORT
                    value: "3306"
                  - name: ATLANTIS_DB_NAME
                    value: "{{ mysql_database }}"
                  - name: ATLANTIS_DB_USER
                    value: "{{ mysql_user }}"
                  - name: ATLANTIS_DB_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: atlantis-secrets
                        key: ATLANTIS_DB_PASSWORD
                  - name: ATLANTIS_REPO_ALLOWLIST
                    value: "{{ atlantis_repo_allowlist | replace('\n', ' ') }}"
                  - name: ATLANTIS_PORT
                    value: "{{ atlantis_port }}"
                  - name: TF_CLI_CONFIG_FILE
                    value: "/home/atlantis/.terraformrc"
                  - name: TF_VAR_cloud_id
                    value: "{{ cloud_id }}"
                  - name: TF_VAR_folder_id
                    value: "{{ folder_id }}"
                  - name: TF_VAR_url
                    value: "{{ atlantis_webhook_url }}"
                  - name: TF_VAR_atlantis_github_user
                    value: "{{ atlantis_github_user }}"
                  - name: TF_VAR_atlantis_repo_allowlist
                    value: "{{ atlantis_repo_allowlist | replace('\n', ' ') }}"
                  - name: TF_VAR_atlantis_github_token
                    value: "{{ atlantis_github_token }}"
                  - name: TF_VAR_atlantis_webhook_secret
                    value: "{{ atlantis_webhook_secret }}"

                  volumeMounts:
                  # Yandex Cloud key
                  - name: yandex-key-volume
                    mountPath: /home/atlantis/.yc
                    readOnly: true
                  
                  # S3 credentials
                  - name: s3-key-volume
                    mountPath: /home/atlantis/.aws
                    readOnly: true
                  
                  # SSH public key
                  - name: pub-key-volume
                    mountPath: /home/atlantis/.ssh
                    readOnly: true
                  
                  - name: terraformrc
                    mountPath: /home/atlantis/.terraformrc
                    subPath: terraformrc
                    readOnly: true

                volumes:
                # Yandex Cloud service account key
                - name: yandex-key-volume
                  secret:
                    secretName: yc-credentials
                    items:
                    - key: key.json
                      path: auth_key_diplom.json
                
                # S3 credentials file
                - name: s3-key-volume
                  secret:
                    secretName: s3-credentials
                    items:
                    - key: credentials
                      path: credentials
                
                # SSH public key
                - name: pub-key-volume
                  secret:
                    secretName: ssh-public-key
                    items:
                    - key: id_rsa.pub
                      path: ssh-key-1756817743452.pub   

                - name: terraformrc
                  configMap:
                    name: atlantis-terraformrc
                    items:
                    - key: terraformrc
                      path: terraformrc

    - name: Применить Atlantis deployment
      command: kubectl apply -f /tmp/atlantis-manifests/atlantis-deployment.yaml

    - name: Создать Atlantis Service манифест
      copy:
        dest: /tmp/atlantis-manifests/atlantis-service.yaml
        content: |
          apiVersion: v1
          kind: Service
          metadata:
            name: atlantis
            namespace: {{ k8s_namespace }}
            labels:
              app: atlantis
          spec:
            type: NodePort
            ports:
            - name: web
              port: 80
              targetPort: {{ atlantis_port }}
              nodePort: {{ atlantis_nodeport | default(32000) }}
              protocol: TCP
            selector:
              app: atlantis    

    - name: Применить Atlantis service
      command: kubectl apply -f /tmp/atlantis-manifests/atlantis-service.yaml
    
    - name: Подождать создание сервиса
      pause:
        seconds: 5    

    # ============================================
    # Автоматическая настройка репозитория
    # ============================================
    - name: Настроить GitHub репозиторий для Atlantis
      block:
        - name: Проверить существование atlantis.yaml
          uri:
            url: "https://api.github.com/repos/{{ atlantis_github_user }}/{{ github_repo }}/contents/atlantis.yaml"
            method: GET
            headers:
              Authorization: "token {{ atlantis_github_token }}"
            status_code: [200, 404]
          register: check_file
        
        - name: Создать atlantis.yaml если не существует
          uri:
            url: "https://api.github.com/repos/{{ atlantis_github_user }}/{{ github_repo }}/contents/atlantis.yaml"
            method: PUT
            headers:
              Authorization: "token {{ atlantis_github_token }}"
            body:
              message: "chore: Add Atlantis configuration"
              content: "{{ atlantis_yaml_content | b64encode }}"
              branch: "{{ github_branch | default('main') }}"
            body_format: json
            status_code: [200, 201] 
          when: check_file.status == 404
        
        - name: Создать webhook для репозитория
          uri:
            url: "https://api.github.com/repos/{{ atlantis_github_user }}/{{ github_repo }}/hooks"
            method: POST
            headers:
              Authorization: "token {{ atlantis_github_token }}"
            body:
              name: "web"
              active: true
              events:
                - pull_request
                - pull_request_review
                - push
                - issue_comment
              config:
                url: "{{ atlantis_webhook_url }}"
                content_type: "json"
                secret: "{{ atlantis_webhook_secret }}"
                insecure_ssl: "1"
            body_format: json
          register: webhook_result
          ignore_errors: yes                  
    
    # ============================================
    # Ожидание Atlantis
    # ============================================
    - name: Ожидание готовности Atlantis
      command: kubectl wait --for=condition=ready pod -l app=atlantis -n {{ k8s_namespace }} --timeout=300s
    
    - name: Получить IP и порт
      command: kubectl get nodes -o wide --selector='!node-role.kubernetes.io/master' -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
      register: worker_ip
    
    - name: Получить NodePort
      command: kubectl get svc atlantis -n {{ k8s_namespace }} -o jsonpath='{.spec.ports[0].nodePort}'
      register: nodeport
    
    - name: Вывести информацию
      debug:
        msg: |
          ==================================================
          ✅ Atlantis установлен с файловыми кредами!
          
          URL: http://{{ worker_ip.stdout }}:{{ nodeport.stdout }}
          
          Файлы кредов смонтированы:
          - Yandex Cloud: /home/atlantis/.yc/key.json
          - S3: /home/atlantis/.aws/credentials
          - SSH: /home/atlantis/.ssh/id_rsa.pub
          ==================================================